services:
  mysql:
    image: mysql:8.4
    container_name: investjournal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: investjournal
      MYSQL_USER: invest
      MYSQL_PASSWORD: invest
    ports:
      - "3307:3306"
    volumes:
      - investjournal_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uinvest", "-pinvest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  investjournal_mysql_data:
